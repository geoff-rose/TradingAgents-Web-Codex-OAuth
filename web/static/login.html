<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradingAgents — Login</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a32;
    --text: #e8e8f0;
    --accent: #5b8cff;
    --red: #ef4444;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    border-bottom: 1px solid var(--border);
    padding: 16px 28px;
    display: flex;
    align-items: center;
    gap: 10px;
  }
  .logo { font-size: 18px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); text-decoration: none; }

  .center {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .card {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 32px 36px;
    width: 340px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .card-title {
    font-size: 15px;
    font-weight: 700;
    color: var(--text);
  }

  .card-subtitle {
    font-size: 12px;
    color: #555;
    margin-top: -10px;
  }

  label {
    display: block;
    font-size: 11px;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.8px;
    color: #666;
    margin-bottom: 5px;
  }

  input[type="password"] {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-size: 13px;
    padding: 9px 11px;
    outline: none;
    transition: border-color 0.15s;
  }
  input[type="password"]:focus { border-color: var(--accent); }

  .btn {
    width: 100%;
    padding: 10px;
    background: var(--accent);
    color: #fff;
    border: none;
    border-radius: 7px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  .btn:hover { opacity: 0.85; }

  .error {
    background: #1f0d0d;
    border: 1px solid #4a1a1a;
    border-radius: 6px;
    padding: 10px 13px;
    font-size: 12px;
    color: var(--red);
  }
</style>
</head>
<body>

<header>
  <a class="logo" href="/">asxagents<span style="color:#a78bfa">.app</span></a>
</header>

<div class="center">
  <form class="card" method="POST" action="/api/login">
    <div class="card-title">Run Analysis</div>
    <div class="card-subtitle">Password required to access the analysis tool.</div>

    <div id="error-box" class="error" style="display:none">Incorrect password.</div>

    <div>
      <label for="pw">Password</label>
      <input id="pw" name="password" type="password" autofocus autocomplete="current-password">
    </div>

    <button class="btn" type="submit">Sign in</button>
  </form>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  if (params.get('error')) {
    document.getElementById('error-box').style.display = 'block';
  }
</script>
</body>
</html>
