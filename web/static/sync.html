<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Sync to Prod — TradingAgents</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a32;
    --text: #e8e8f0;
    --muted: #666;
    --accent: #5b8cff;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --header-h: 53px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
  }

  header {
    height: var(--header-h);
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .logo { font-size: 17px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); text-decoration: none; }
  nav { display: flex; gap: 4px; }
  nav a {
    font-size: 13px; color: var(--muted); text-decoration: none;
    padding: 5px 11px; border-radius: 6px; transition: background 0.12s, color 0.12s;
  }
  nav a:hover { background: var(--surface2); color: var(--text); }
  nav a.active { background: var(--surface2); color: var(--text); }
  .nav-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }

  .page {
    flex: 1;
    max-width: 960px;
    width: 100%;
    margin: 0 auto;
    padding: 32px 24px;
    display: flex;
    flex-direction: column;
    gap: 24px;
  }

  .page-title {
    font-size: 20px;
    font-weight: 700;
  }
  .page-subtitle {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* ── Controls bar ── */
  .controls {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .btn {
    padding: 8px 18px;
    font-size: 13px;
    font-weight: 600;
    border-radius: 7px;
    border: 1px solid var(--border);
    cursor: pointer;
    transition: opacity 0.15s, border-color 0.15s, background 0.15s;
    background: var(--surface2);
    color: var(--text);
    white-space: nowrap;
  }
  .btn:hover { border-color: var(--accent); color: var(--accent); }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }
  .btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }
  .btn.primary:hover { opacity: 0.85; color: #fff; border-color: var(--accent); }
  .btn.danger { background: var(--red); border-color: var(--red); color: #fff; }
  .btn.danger:hover { opacity: 0.85; color: #fff; border-color: var(--red); }

  .sel-count {
    font-size: 12px;
    color: var(--muted);
    margin-left: auto;
  }

  /* ── Search ── */
  .search-wrap {
    position: relative;
    width: 220px;
  }
  .search-wrap input {
    width: 100%;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 7px;
    color: var(--text);
    font-size: 13px;
    padding: 7px 11px;
    outline: none;
    transition: border-color 0.15s;
  }
  .search-wrap input:focus { border-color: var(--accent); }

  /* ── Ticker grid ── */
  .ticker-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(130px, 1fr));
    gap: 8px;
    max-height: 420px;
    overflow-y: auto;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 14px;
  }
  .ticker-grid::-webkit-scrollbar { width: 4px; }
  .ticker-grid::-webkit-scrollbar-thumb { background: #2a2a32; border-radius: 2px; }

  .ticker-item {
    display: flex;
    align-items: center;
    gap: 8px;
    padding: 7px 10px;
    border-radius: 6px;
    border: 1px solid transparent;
    cursor: pointer;
    transition: background 0.1s, border-color 0.1s;
    user-select: none;
  }
  .ticker-item:hover { background: var(--surface2); }
  .ticker-item.checked { background: rgba(91,140,255,0.1); border-color: rgba(91,140,255,0.3); }

  .ticker-item input[type="checkbox"] {
    accent-color: var(--accent);
    width: 14px; height: 14px;
    flex-shrink: 0;
    cursor: pointer;
  }
  .ticker-item label {
    font-size: 12px;
    font-weight: 600;
    color: var(--text);
    cursor: pointer;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .ticker-date {
    font-size: 10px;
    color: var(--muted);
    margin-top: 1px;
  }
  .ticker-date.stale { color: var(--yellow); }

  .loading-tickers {
    grid-column: 1 / -1;
    padding: 20px;
    text-align: center;
    color: var(--muted);
    font-size: 13px;
  }

  /* ── Log output ── */
  .log-wrap {
    background: #0a0a0e;
    border: 1px solid var(--border);
    border-radius: 10px;
    overflow: hidden;
    display: none;
  }
  .log-wrap.visible { display: block; }

  .log-header {
    padding: 10px 16px;
    border-bottom: 1px solid var(--border);
    font-size: 12px;
    font-weight: 600;
    color: var(--muted);
    display: flex;
    align-items: center;
    justify-content: space-between;
  }

  .log-status {
    font-size: 11px;
    font-weight: 600;
    padding: 2px 8px;
    border-radius: 4px;
  }
  .log-status.running { background: rgba(245,158,11,0.15); color: var(--yellow); }
  .log-status.done    { background: rgba(34,197,94,0.15);  color: var(--green); }
  .log-status.error   { background: rgba(239,68,68,0.15);  color: var(--red); }

  #log-output {
    padding: 14px 16px;
    max-height: 340px;
    overflow-y: auto;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    font-size: 11.5px;
    line-height: 1.65;
    color: #9ca3af;
    white-space: pre-wrap;
    word-break: break-all;
  }
  #log-output::-webkit-scrollbar { width: 4px; }
  #log-output::-webkit-scrollbar-thumb { background: #2a2a32; border-radius: 2px; }
  #log-output .line-done  { color: var(--green); }
  #log-output .line-stats { color: #9ca3af; }
  #log-output .line-err   { color: var(--red); }
</style>
</head>
<body>

<header>
  <a class="logo" href="/">asxagents<span style="color:#a78bfa">.app</span></a>
  <nav>
    <a href="/analysis">Run Analysis</a>
    <a href="/reports">Reports</a>
    <a href="/performance">Performance</a>
    <a href="/sync" class="active">Sync</a>
  </nav>
  <div class="nav-right">
    <a href="/api/logout">Logout</a>
  </div>
</header>

<div class="page">
  <div>
    <div class="page-title">Sync Reports to Prod</div>
    <div class="page-subtitle">Push local report files to the production server.</div>
  </div>

  <div class="controls">
    <button class="btn" onclick="selectAll()">Select All</button>
    <button class="btn" onclick="selectNone()">Select None</button>
    <button class="btn" id="stale-btn" onclick="selectStale()">Select Stale</button>
    <div class="search-wrap">
      <input type="text" id="search" placeholder="Filter tickers…" oninput="renderTickers()">
    </div>
    <label style="display:flex;align-items:center;gap:6px;font-size:12px;color:var(--muted);cursor:pointer">
      <input type="checkbox" id="stale-only" onchange="renderTickers()" style="accent-color:var(--accent)">
      Stale only
    </label>
    <span class="sel-count" id="sel-count">0 selected</span>
    <button class="btn primary" id="sync-btn" onclick="startSync()" disabled>↑ Sync Selected</button>
  </div>

  <div class="ticker-grid" id="ticker-grid">
    <div class="loading-tickers">Loading local reports…</div>
  </div>

  <div class="log-wrap" id="log-wrap">
    <div class="log-header">
      <span>Sync Output</span>
      <span class="log-status running" id="log-status">Running…</span>
    </div>
    <div id="log-output"></div>
  </div>
</div>

<script>
  let allTickers = []; // [{ticker, latest_date}]
  let syncing = false;

  const today = new Date().toISOString().slice(0, 10);
  const yesterday = new Date(Date.now() - 86400000).toISOString().slice(0, 10);

  function isStale(entry) {
    return !entry.latest_date || entry.latest_date < today;
  }

  // ── Load tickers ────────────────────────────────────────────────────────────
  async function loadTickers() {
    const res = await fetch('/api/sync/local-reports');
    const data = await res.json();
    allTickers = data.tickers;
    renderTickers();
  }

  function renderTickers() {
    const q          = document.getElementById('search').value.toLowerCase();
    const staleOnly  = document.getElementById('stale-only').checked;
    const checked    = new Set(
      [...document.querySelectorAll('.ticker-grid input[type="checkbox"]:checked')].map(c => c.value)
    );

    let entries = allTickers;
    if (q)         entries = entries.filter(e => e.ticker.toLowerCase().includes(q));
    if (staleOnly) entries = entries.filter(e => isStale(e));

    const grid = document.getElementById('ticker-grid');
    if (!entries.length) {
      grid.innerHTML = '<div class="loading-tickers">No matching tickers.</div>';
      updateCount();
      return;
    }

    grid.innerHTML = entries.map(e => {
      const t       = e.ticker;
      const stale   = isStale(e);
      const dateCls = stale ? 'ticker-date stale' : 'ticker-date';
      const dateStr = e.latest_date || '—';
      const isChk   = checked.has(t);
      return `
        <div class="ticker-item${isChk ? ' checked' : ''}" id="item-${CSS.escape(t)}" onclick="toggleTicker('${t}')">
          <input type="checkbox" id="chk-${CSS.escape(t)}" value="${t}" ${isChk ? 'checked' : ''}
                 onchange="updateCount()" onclick="event.stopPropagation()">
          <div style="min-width:0">
            <label for="chk-${CSS.escape(t)}">${t}</label>
            <div class="${dateCls}">${dateStr}</div>
          </div>
        </div>`;
    }).join('');
    updateCount();
  }

  function selectStale() {
    // Check all stale tickers regardless of current filter
    allTickers.forEach(e => {
      const chk = document.getElementById(`chk-${CSS.escape(e.ticker)}`);
      if (chk) {
        chk.checked = isStale(e);
        updateItemStyle(e.ticker, chk.checked);
      }
    });
    updateCount();
  }

  function toggleTicker(ticker) {
    const chk = document.getElementById(`chk-${CSS.escape(ticker)}`);
    chk.checked = !chk.checked;
    updateItemStyle(ticker, chk.checked);
    updateCount();
  }

  function updateItemStyle(ticker, checked) {
    const item = document.getElementById(`item-${CSS.escape(ticker)}`);
    if (item) item.classList.toggle('checked', checked);
  }

  function updateCount() {
    const checked = document.querySelectorAll('.ticker-grid input[type="checkbox"]:checked');
    const total   = document.querySelectorAll('.ticker-grid input[type="checkbox"]');
    document.getElementById('sel-count').textContent = `${checked.length} of ${total.length} selected`;
    document.getElementById('sync-btn').disabled = checked.length === 0 || syncing;
    // Sync up item styles
    checked.forEach(chk => updateItemStyle(chk.value, true));
  }

  function selectAll() {
    document.querySelectorAll('.ticker-grid input[type="checkbox"]').forEach(c => {
      c.checked = true; updateItemStyle(c.value, true);
    });
    updateCount();
  }

  function selectNone() {
    document.querySelectorAll('.ticker-grid input[type="checkbox"]').forEach(c => {
      c.checked = false; updateItemStyle(c.value, false);
    });
    updateCount();
  }

  // ── Sync ────────────────────────────────────────────────────────────────────
  async function startSync() {
    if (syncing) return;
    const selected = [...document.querySelectorAll('.ticker-grid input[type="checkbox"]:checked')]
      .map(c => c.value);
    if (!selected.length) return;

    syncing = true;
    document.getElementById('sync-btn').disabled = true;
    document.getElementById('sync-btn').textContent = '↑ Syncing…';

    const logWrap   = document.getElementById('log-wrap');
    const logOutput = document.getElementById('log-output');
    const logStatus = document.getElementById('log-status');

    logWrap.classList.add('visible');
    logOutput.innerHTML = '';
    logStatus.className = 'log-status running';
    logStatus.textContent = 'Running…';

    function appendLine(text, cls) {
      const span = document.createElement('span');
      if (cls) span.className = cls;
      span.textContent = text + '\n';
      logOutput.appendChild(span);
      logOutput.scrollTop = logOutput.scrollHeight;
    }

    try {
      const res = await fetch('/api/sync', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ tickers: selected }),
      });

      const reader = res.body.getReader();
      const decoder = new TextDecoder();
      let buf = '';

      while (true) {
        const { done, value } = await reader.read();
        if (done) break;
        buf += decoder.decode(value, { stream: true });
        const parts = buf.split('\n\n');
        buf = parts.pop();
        for (const part of parts) {
          const line = part.replace(/^data: /, '');
          if (!line.trim()) continue;
          try {
            const ev = JSON.parse(line);
            if (ev.type === 'start') {
              appendLine(`rsync → ${ev.cmd}`, 'line-stats');
            } else if (ev.type === 'line') {
              const t = ev.text;
              const cls = /sent|receiv|total|speed|Number of/i.test(t) ? 'line-stats'
                        : /error|fail|denied/i.test(t) ? 'line-err' : '';
              appendLine(t, cls);
            } else if (ev.type === 'done') {
              if (ev.code === 0) {
                appendLine('✓ Sync complete.', 'line-done');
                logStatus.className = 'log-status done';
                logStatus.textContent = 'Done';
              } else {
                appendLine(`✗ rsync exited with code ${ev.code}`, 'line-err');
                logStatus.className = 'log-status error';
                logStatus.textContent = 'Error';
              }
            }
          } catch {}
        }
      }
    } catch (e) {
      appendLine(`Error: ${e.message}`, 'line-err');
      logStatus.className = 'log-status error';
      logStatus.textContent = 'Error';
    }

    syncing = false;
    document.getElementById('sync-btn').disabled = false;
    document.getElementById('sync-btn').textContent = '↑ Sync Selected';
  }

  // ── Init ────────────────────────────────────────────────────────────────────
  loadTickers();
</script>
</body>
</html>
