<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TradingAgents — Reports</title>
<script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a32;
    --text: #e8e8f0;
    --muted: #666;
    --accent: #5b8cff;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #f59e0b;
    --header-h: 53px;
  }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Inter', system-ui, -apple-system, sans-serif;
    height: 100vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* ── Header ── */
  header {
    height: var(--header-h);
    flex-shrink: 0;
    border-bottom: 1px solid var(--border);
    padding: 0 24px;
    display: flex;
    align-items: center;
    gap: 24px;
  }
  .logo { font-size: 17px; font-weight: 700; letter-spacing: -0.5px; color: var(--text); text-decoration: none; }
  nav { display: flex; gap: 4px; }
  .nav-right { margin-left: auto; display: flex; gap: 8px; align-items: center; }
  nav a {
    font-size: 13px;
    color: var(--muted);
    text-decoration: none;
    padding: 5px 11px;
    border-radius: 6px;
    transition: background 0.12s, color 0.12s;
  }
  nav a:hover { background: var(--surface2); color: var(--text); }
  nav a.active { background: var(--surface2); color: var(--text); }

  /* ── Layout ── */
  .layout {
    display: flex;
    flex: 1;
    min-height: 0;
  }

  /* ── Ticker sidebar ── */
  .sidebar {
    width: 200px;
    flex-shrink: 0;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    padding: 12px 0;
  }
  .sidebar::-webkit-scrollbar { width: 4px; }
  .sidebar::-webkit-scrollbar-thumb { background: #2a2a32; border-radius: 2px; }

  .ticker-group { margin-bottom: 4px; }
  .ticker-label {
    display: flex;
    align-items: center;
    justify-content: space-between;
    padding: 6px 14px;
    font-size: 13px;
    font-weight: 600;
    cursor: pointer;
    user-select: none;
    color: var(--text);
    border-radius: 0;
    transition: background 0.1s;
  }
  .ticker-label:hover { background: var(--surface2); }
  .ticker-label .chevron { font-size: 9px; color: var(--muted); transition: transform 0.15s; }
  .ticker-label.open .chevron { transform: rotate(90deg); }

  .date-list { display: none; }
  .date-list.open { display: block; }
  .date-item {
    padding: 5px 14px 5px 26px;
    font-size: 12px;
    color: var(--muted);
    cursor: pointer;
    transition: background 0.1s, color 0.1s;
  }
  .date-item:hover { background: var(--surface2); color: var(--text); }
  .date-item.active { background: #141e38; color: var(--accent); }

  .sidebar-empty {
    padding: 20px 14px;
    font-size: 12px;
    color: #444;
  }

  /* ── Report viewer ── */
  .viewer {
    flex: 1;
    min-width: 0;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }

  /* Placeholder */
  .placeholder {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    color: #3a3a44;
  }
  .placeholder .icon { font-size: 44px; }
  .placeholder p { font-size: 14px; }

  /* Report header bar */
  .report-header {
    display: none;
    flex-shrink: 0;
    padding: 14px 24px 0;
    gap: 14px;
    align-items: center;
    flex-wrap: wrap;
  }
  .report-header.visible { display: flex; }

  .report-badge {
    font-size: 15px;
    font-weight: 800;
    letter-spacing: 0.5px;
    padding: 3px 12px;
    border-radius: 5px;
  }
  .BUY        .report-badge { background: #16532a; color: var(--green); }
  .OVERWEIGHT .report-badge { background: #0d2040; color: #60a5fa; }
  .SELL       .report-badge { background: #531616; color: var(--red); }
  .UNDERWEIGHT .report-badge { background: #3a1a08; color: #f97316; }
  .HOLD       .report-badge { background: #534010; color: var(--yellow); }
  .UNKNOWN    .report-badge { background: var(--surface2); color: #666; }

  .report-title { font-size: 18px; font-weight: 700; }
  .report-date  { font-size: 12px; color: var(--muted); }

  /* Team bar (top-level pill buttons) */
  .team-bar {
    display: none;
    flex-shrink: 0;
    padding: 16px 24px 0;
    gap: 8px;
    flex-wrap: wrap;
  }
  .team-bar.visible { display: flex; }

  .team-btn {
    padding: 7px 18px;
    font-size: 13px;
    font-weight: 600;
    color: var(--muted);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 20px;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.12s, border-color 0.12s, background 0.12s;
  }
  /* Per-team colours */
  .team-btn[data-team="decision"]:hover  { color: #2dd4bf; border-color: rgba(20,184,166,0.4); }
  .team-btn[data-team="decision"].active { color: #2dd4bf; background: rgba(20,184,166,0.12); border-color: rgba(20,184,166,0.5); }

  .team-btn[data-team="analyst"]:hover   { color: #818cf8; border-color: rgba(99,102,241,0.4); }
  .team-btn[data-team="analyst"].active  { color: #818cf8; background: rgba(99,102,241,0.12); border-color: rgba(99,102,241,0.5); }

  .team-btn[data-team="research"]:hover  { color: #4ade80; border-color: rgba(74,222,128,0.4); }
  .team-btn[data-team="research"].active { color: #4ade80; background: rgba(74,222,128,0.12); border-color: rgba(74,222,128,0.5); }

  .team-btn[data-team="trading"]:hover   { color: #fb923c; border-color: rgba(251,146,60,0.4); }
  .team-btn[data-team="trading"].active  { color: #fb923c; background: rgba(251,146,60,0.12); border-color: rgba(251,146,60,0.5); }

  /* Sub bar (report buttons within a team) */
  .sub-bar {
    display: none;
    flex-shrink: 0;
    padding: 10px 24px 12px;
    border-bottom: 1px solid var(--border);
    gap: 6px;
    flex-wrap: wrap;
  }
  .sub-bar.visible { display: flex; }

  .sub-btn {
    padding: 5px 14px;
    font-size: 12px;
    font-weight: 500;
    color: var(--muted);
    background: none;
    border: 1px solid var(--border);
    border-radius: 14px;
    cursor: pointer;
    white-space: nowrap;
    transition: color 0.12s, border-color 0.12s, background 0.12s;
  }
  /* Per-report sub-button colours */
  .sub-btn[data-key="market_report"]:hover        { color: #60a5fa; border-color: rgba(96,165,250,0.4); }
  .sub-btn[data-key="market_report"].active       { color: #60a5fa; background: rgba(96,165,250,0.1); border-color: rgba(96,165,250,0.45); }

  .sub-btn[data-key="sentiment_report"]:hover     { color: #f472b6; border-color: rgba(244,114,182,0.4); }
  .sub-btn[data-key="sentiment_report"].active    { color: #f472b6; background: rgba(244,114,182,0.1); border-color: rgba(244,114,182,0.45); }

  .sub-btn[data-key="news_report"]:hover          { color: #fbbf24; border-color: rgba(251,191,36,0.4); }
  .sub-btn[data-key="news_report"].active         { color: #fbbf24; background: rgba(251,191,36,0.1); border-color: rgba(251,191,36,0.45); }

  .sub-btn[data-key="fundamentals_report"]:hover  { color: #34d399; border-color: rgba(52,211,153,0.4); }
  .sub-btn[data-key="fundamentals_report"].active { color: #34d399; background: rgba(52,211,153,0.1); border-color: rgba(52,211,153,0.45); }

  .sub-btn[data-key="short_interest_report"]:hover  { color: #38bdf8; border-color: rgba(56,189,248,0.4); }
  .sub-btn[data-key="short_interest_report"].active { color: #38bdf8; background: rgba(56,189,248,0.1); border-color: rgba(56,189,248,0.45); }

  .sub-btn[data-key="investment_plan"]:hover      { color: #a78bfa; border-color: rgba(167,139,250,0.4); }
  .sub-btn[data-key="investment_plan"].active     { color: #a78bfa; background: rgba(167,139,250,0.1); border-color: rgba(167,139,250,0.45); }

  .sub-btn[data-key="trader_investment_plan"]:hover  { color: #fb923c; border-color: rgba(251,146,60,0.4); }
  .sub-btn[data-key="trader_investment_plan"].active { color: #fb923c; background: rgba(251,146,60,0.1); border-color: rgba(251,146,60,0.45); }

  /* Tab panels wrapper — must fill remaining viewer height */
  #tab-panels {
    flex: 1;
    min-height: 0;
    overflow: hidden;
  }

  /* Tab content */
  .tab-content {
    height: 100%;
    overflow-y: auto;
    padding: 24px;
    display: none;
  }
  .tab-content.active { display: block; }
  .tab-content::-webkit-scrollbar { width: 5px; }
  .tab-content::-webkit-scrollbar-thumb { background: #2a2a32; border-radius: 3px; }

  /* Decision panel inside Decision tab */
  .decision-panel {
    border-radius: 9px;
    padding: 18px 22px;
    border: 1px solid;
    margin-bottom: 20px;
  }
  .decision-panel.BUY         { background: #0d1f14; border-color: #1a4a28; }
  .decision-panel.OVERWEIGHT  { background: #0a1628; border-color: #1a3a5c; }
  .decision-panel.SELL        { background: #1f0d0d; border-color: #4a1a1a; }
  .decision-panel.UNDERWEIGHT { background: #2a1208; border-color: #5a2a10; }
  .decision-panel.HOLD        { background: #1a1608; border-color: #4a3a10; }
  .decision-panel.UNKNOWN     { background: var(--surface); border-color: var(--border); }
  .decision-panel.BUY         .md-body h1:first-child, .decision-panel.BUY         .md-body h2:first-child { color: #22c55e; }
  .decision-panel.OVERWEIGHT  .md-body h1:first-child, .decision-panel.OVERWEIGHT  .md-body h2:first-child { color: #60a5fa; }
  .decision-panel.SELL        .md-body h1:first-child, .decision-panel.SELL        .md-body h2:first-child { color: #ef4444; }
  .decision-panel.UNDERWEIGHT .md-body h1:first-child, .decision-panel.UNDERWEIGHT .md-body h2:first-child { color: #f97316; }
  .decision-panel.HOLD        .md-body h1:first-child, .decision-panel.HOLD        .md-body h2:first-child { color: #f59e0b; }

  /* ── Scorecard visual component ── */
  .sc-wrap { animation: fadeIn 0.2s ease; }

  .sc-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    padding: 18px 22px;
    border-radius: 10px;
    border: 1px solid;
    margin-bottom: 22px;
  }
  .sc-rating { font-size: 22px; font-weight: 800; letter-spacing: 0.5px; margin-bottom: 4px; }
  .sc-thresholds { font-size: 11px; color: #555; margin-top: 2px; }

  /* Overall score: large ring */
  .sc-total-ring { flex-shrink: 0; }

  .sc-dims { margin-bottom: 4px; }
  .sc-dim { padding: 12px 0; border-bottom: 1px solid #18181f; }
  .sc-dim:last-child { border-bottom: none; }

  /* Dimension row: circle on left, text on right */
  .sc-dim-row { display: flex; gap: 14px; align-items: flex-start; }
  .sc-dim-ring { flex-shrink: 0; }
  .sc-dim-text { flex: 1; min-width: 0; padding-top: 4px; }
  .sc-dim-name   { font-size: 13px; font-weight: 600; color: #ccc; margin-bottom: 5px; }
  .sc-dim-reason { font-size: 12px; color: #777; line-height: 1.55; }

  .sc-thesis { border-top: 1px solid var(--border); padding-top: 16px; margin-top: 12px; }
  .sc-thesis-label {
    font-size: 11px; font-weight: 600; text-transform: uppercase;
    letter-spacing: 0.8px; color: #555; margin-bottom: 10px;
  }
  .sc-thesis-body p { font-size: 13px; line-height: 1.75; color: #bbb; margin-bottom: 10px; }
  .sc-thesis-body p:last-child { margin-bottom: 0; }

  .sc-meta { display: flex; gap: 20px; padding-top: 14px; font-size: 12px; color: #888; flex-wrap: wrap; }
  .sc-meta strong { color: #aaa; }

  /* Analyst signal header — shown at top of each analyst tab */
  .analyst-sig-header {
    display: flex;
    align-items: center;
    gap: 20px;
    padding: 16px 22px;
    border-radius: 10px;
    border: 1px solid;
    margin-bottom: 20px;
  }
  .analyst-sig-label { font-size: 22px; font-weight: 800; letter-spacing: 0.3px; }
  .analyst-sig-conf  { font-size: 12px; color: #666; margin-top: 3px; }

  /* Markdown styles */
  .md-body h1 { font-size: 22px; font-weight: 700; margin: 20px 0 10px; color: var(--text); }
  .md-body h2 { font-size: 17px; font-weight: 700; margin: 18px 0 8px; color: var(--text); }
  .md-body h3 { font-size: 14px; font-weight: 700; margin: 14px 0 6px; color: #ccc; }
  .md-body h4 { font-size: 13px; font-weight: 600; margin: 12px 0 5px; color: #aaa; }
  .md-body p  { font-size: 13px; line-height: 1.75; color: #bbb; margin-bottom: 10px; }
  .md-body ul, .md-body ol { padding-left: 20px; margin-bottom: 10px; }
  .md-body li { font-size: 13px; line-height: 1.7; color: #bbb; margin-bottom: 3px; }
  .md-body strong { color: var(--text); font-weight: 600; }
  .md-body em { color: #aaa; }
  .md-body code {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 5px;
    font-size: 12px;
    font-family: 'JetBrains Mono', 'Fira Code', monospace;
    color: #a78bfa;
  }
  .md-body pre {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 12px 14px;
    overflow-x: auto;
    margin-bottom: 12px;
  }
  .md-body pre code {
    background: none;
    border: none;
    padding: 0;
    font-size: 12px;
    color: #ccc;
  }
  .md-body hr {
    border: none;
    border-top: 1px solid var(--border);
    margin: 16px 0;
  }
  .md-body blockquote {
    border-left: 3px solid var(--accent);
    padding: 6px 14px;
    margin: 10px 0;
    background: var(--surface2);
    border-radius: 0 5px 5px 0;
  }
  .md-body blockquote p { margin: 0; color: #aaa; }
  .md-body table {
    width: 100%;
    border-collapse: collapse;
    margin-bottom: 14px;
    font-size: 12px;
  }
  .md-body th {
    text-align: left;
    padding: 7px 10px;
    background: var(--surface2);
    color: #aaa;
    font-weight: 600;
    border: 1px solid var(--border);
  }
  .md-body td {
    padding: 6px 10px;
    border: 1px solid var(--border);
    color: #bbb;
    vertical-align: top;
  }
  .md-body tr:nth-child(even) td { background: #13131700; }
  .md-body tr:hover td { background: var(--surface2); }
  .md-body a { color: var(--accent); text-decoration: none; }
  .md-body a:hover { text-decoration: underline; }

  /* ── Company logo in header ── */
  #rh-logo {
    width: 40px; height: 40px;
    border-radius: 8px;
    object-fit: contain;
    background: var(--surface2);
    flex-shrink: 0;
    display: none;
  }

  /* ── Company info panel ── */
  .co-header {
    display: flex;
    align-items: center;
    gap: 14px;
    margin-bottom: 20px;
  }
  .co-logo {
    width: 56px; height: 56px;
    border-radius: 10px;
    object-fit: contain;
    background: var(--surface2);
    flex-shrink: 0;
  }
  .co-name { font-size: 18px; font-weight: 700; color: var(--text); }
  .co-chips { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 5px; }
  .co-chip {
    font-size: 11px; font-weight: 600;
    padding: 3px 9px;
    border-radius: 20px;
    background: var(--surface2);
    border: 1px solid var(--border);
    color: #aaa;
  }
  .co-description {
    font-size: 13px; line-height: 1.75; color: #bbb;
    margin-bottom: 18px;
    border-left: 3px solid var(--border);
    padding-left: 14px;
  }
  .co-website {
    font-size: 13px; margin-bottom: 22px;
    color: var(--muted);
  }
  .co-website a { color: var(--accent); text-decoration: none; }
  .co-website a:hover { text-decoration: underline; }
  .co-metrics {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 10px;
    margin-bottom: 6px;
  }
  @media (max-width: 700px) { .co-metrics { grid-template-columns: repeat(2, 1fr); } }
  .co-metric {
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 8px;
    padding: 12px 14px;
  }
  .co-metric-label { font-size: 11px; color: var(--muted); margin-bottom: 4px; font-weight: 500; }
  .co-metric-value { font-size: 17px; font-weight: 700; color: var(--text); }

  /* Loading spinner */
  .loading {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 40px;
    color: var(--muted);
    font-size: 13px;
  }
  .spinner {
    width: 16px; height: 16px;
    border: 2px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
  }
  @keyframes spin { to { transform: rotate(360deg); } }
  @keyframes fadeIn { from { opacity: 0; transform: translateY(3px); } to { opacity: 1; transform: none; } }
</style>
</head>
<body>

<header>
  <a class="logo" href="/">asxagents<span style="color:#a78bfa">.app</span></a>
  <nav>
    <a id="analysis-nav-link" href="/analysis" style="display:none">Run Analysis</a>
    <a href="/reports" class="active">Reports</a>
    <a href="/performance">Performance</a>
    <a id="sync-nav-link" href="/sync" style="display:none">Sync</a>
  </nav>
  <div class="nav-right">
    <a id="logout-nav-link" href="/api/logout" style="display:none">Logout</a>
  </div>
</header>

<div class="layout">

  <!-- Sidebar -->
  <aside class="sidebar" id="sidebar">
    <div class="loading"><div class="spinner"></div>Loading…</div>
  </aside>

  <!-- Viewer -->
  <div class="viewer" id="viewer">

    <div class="placeholder" id="placeholder">
      <div class="icon">📂</div>
      <p>Select a report from the list.</p>
    </div>

    <div class="report-header" id="report-header">
      <img id="rh-logo" alt="">
      <div id="rh-badge-wrap">
        <span class="report-badge" id="rh-badge">—</span>
      </div>
      <div>
        <div class="report-title" id="rh-title"></div>
        <div class="report-date"  id="rh-date"></div>
      </div>
    </div>

    <div class="team-bar" id="team-bar"></div>
    <div class="sub-bar"  id="sub-bar"></div>

    <div id="tab-panels"></div>

  </div>
</div>

<script>
  // ── Config ──────────────────────────────────────────────────────────
  const TEAMS = [
    {
      key: 'decision', label: 'Decision',
      reports: [
        { key: 'final_trade_decision', label: 'Decision' },
      ],
    },
    {
      key: 'analyst', label: 'Analyst Team',
      reports: [
        { key: 'market_report',         label: 'Market' },
        { key: 'sentiment_report',      label: 'Sentiment' },
        { key: 'news_report',           label: 'News' },
        { key: 'fundamentals_report',   label: 'Fundamentals' },
        { key: 'short_interest_report', label: 'Short Interest' },
      ],
    },
    {
      key: 'research', label: 'Research Team',
      reports: [
        { key: 'investment_plan', label: 'Investment Plan' },
      ],
    },
    {
      key: 'trading', label: 'Trading Team',
      reports: [
        { key: 'trader_investment_plan', label: 'Trader Plan' },
      ],
    },
  ];

  // ── Signal detection ────────────────────────────────────────────────
  // Only inspect the first 1000 chars (the heading/summary section).
  // Body text can contain phrases like "conditions to upgrade to Overweight"
  // which would cause false positives if we searched the full document.
  function parseDecision(text) {
    const header = (text || '').slice(0, 1000);

    // 1. Explicit "Rating: SIGNAL" line (most reliable)
    const ratingMatch = header.match(/Rating:\s*\*{0,2}(Strong Buy|Strong Sell|Overweight|Underweight|Hold|Buy|Sell)\b/i);
    if (ratingMatch) return classify(ratingMatch[1]);

    // 2. Extract **...** bold spans and look for signal words inside them
    const boldRe = /\*\*([^*\n]{1,120})\*\*/g;
    const signals = [
      ['strong buy',  'BUY',         'Strong Buy'],
      ['strong sell', 'SELL',        'Strong Sell'],
      ['overweight',  'OVERWEIGHT',  'Overweight'],
      ['underweight', 'UNDERWEIGHT', 'Underweight'],
      ['hold',        'HOLD',        'Hold'],
      ['buy',         'BUY',         'Buy'],
      ['sell',        'SELL',        'Sell'],
    ];
    let m;
    while ((m = boldRe.exec(header)) !== null) {
      const span = m[1].toLowerCase();
      for (const [kw, signal, label] of signals) {
        if (!span.includes(kw)) continue;
        // Skip negated: "not a strong buy"
        const idx = span.indexOf(kw);
        if (/\bnot\b/.test(span.slice(0, idx))) continue;
        return { signal, label };
      }
    }

    return { signal: 'UNKNOWN', label: '—' };
  }

  // Parse the standardised ## Analyst Signal block produced by each analyst
  function parseAnalystSignal(text) {
    const block = (text || '').match(/##\s*Analyst Signal[\s\S]{0,800}/i);
    if (!block) {
      // Fallback: short interest "FINAL TRANSACTION PROPOSAL: **X**"
      const propM = (text || '').match(/FINAL\s+TRANSACTION\s+PROPOSAL:\s+\*\*([A-Za-z ]+)\*\*/i);
      if (propM) {
        const raw = propM[1].trim();
        const { signal } = classify(raw);
        const confMap = { high: 80, medium: 55, low: 30 };
        const confM = text.match(/\*\*Confidence[*:]+\s*\*{0,2}(High|Medium|Low)\*{0,2}/i);
        const confidence = confM ? (confMap[(confM[1] || '').toLowerCase()] ?? null) : null;
        return { signal, label: raw, confidence, outlook: null };
      }
      // Fallback: research/trading plan — handles both:
      //   "**Recommendation**: Hold"  (bold closes before colon)
      //   "**Recommendation for X: Hold**"  (bold closes after signal)
      const recM = (text || '').match(/^\*\*Recommendation(?:\s+for\s+[^*:\n]+)?\*{0,2}:\s*([A-Za-z ]+?)\s*\*{0,2}\s*$/im);
      if (!recM) return null;
      const raw = recM[1].trim();
      const { signal } = classify(raw);
      return { signal, label: raw, confidence: null, outlook: null };
    }
    const sigM     = block[0].match(/\*\*Signal:\*\*\s*([A-Za-z ]+)/i);
    const confM    = block[0].match(/\*\*Confidence:\*\*\s*(\d+)\s*\/\s*100/i);
    const outlookM = block[0].match(/\*\*Outlook:\*\*\s*(\d+)\s*\/\s*100/i);
    if (!sigM) return null;
    const raw = sigM[1].trim();
    const { signal } = classify(raw);
    return {
      signal,
      label: raw,
      confidence: confM    ? parseInt(confM[1])    : null,
      outlook:    outlookM ? parseInt(outlookM[1]) : null,
    };
  }

  function classify(raw) {
    const r = (raw || '').toLowerCase().trim();
    const label = raw.charAt(0).toUpperCase() + raw.slice(1).toLowerCase();
    if (r === 'strong buy'  || r === 'buy')  return { signal: 'BUY',         label };
    if (r === 'strong sell' || r === 'sell') return { signal: 'SELL',        label };
    if (r === 'overweight')                  return { signal: 'OVERWEIGHT',  label };
    if (r === 'underweight')                 return { signal: 'UNDERWEIGHT', label };
    return { signal: 'HOLD', label };
  }

  function escHtml(s) {
    return (s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // ── Scorecard parser — format-agnostic, handles all variants across 300 tickers ──
  function parseScorecard(text) {
    // Quick bail: must look like a scorecard at all
    if (!/scorecard|\/\s*100/i.test(text)) return null;

    // ── Format A: new structured "## Rating: **X** (Score: N/100)" ────────
    const newFmt = text.match(/##\s+Rating:\s+\*\*([^*]+)\*\*\s+\(Score:\s+(\d+)\/100\)/);
    if (newFmt) {
      const rating = newFmt[1].trim();
      const total  = parseInt(newFmt[2]);
      const dims   = [];
      const rowRe  = /\|\s+([^|*\-]{2,}?)\s+\|\s+(\d+)\s+\|\s+(\d+)\s+\|\s*([^|]*?)\s*\|/g;
      let m;
      while ((m = rowRe.exec(text)) !== null) {
        const name = m[1].trim();
        if (/^[-=]/.test(name) || /dimension/i.test(name) || /^\*\*total/i.test(name)) continue;
        dims.push({ name, score: parseInt(m[2]), max: parseInt(m[3]), reasoning: m[4].trim() });
      }
      if (!dims.length) return null;
      const thesisM = text.match(/###\s+Investment Thesis\s*\n+([\s\S]+?)(?:\n\n\*\*(?:Price Target|Time Horizon)|$)/);
      const ptM = text.match(/\*\*Price Target\*\*:\s*(.+)/);
      const thM = text.match(/\*\*Time Horizon\*\*:\s*(.+)/);
      return { rating, total, dims,
        thesis: (thesisM?.[1] || '').trim(),
        priceTarget: ptM?.[1]?.trim(), timeHorizon: thM?.[1]?.trim() };
    }

    // ── Formats B/C/D: flexible extraction ───────────────────────────────
    // Helper: derive rating from total score using standard thresholds
    function ratingFromTotal(n) {
      return n >= 70 ? 'Buy' : n >= 55 ? 'Overweight' : n >= 38 ? 'Hold' : n >= 22 ? 'Underweight' : 'Sell';
    }

    // ── Step 1: Collect dimension rows ────────────────────────────────────
    // Pattern A (bold dim name): | **name** | **N / max** | reasoning |
    let rowMatches = [...text.matchAll(
      /\|\s+\*\*([^|*]+?)\*\*\s+\|\s+\*\*(\d+)\s*\/\s*(\d+)\*\*\s+\|([^|]*)\|/g
    )];
    // Pattern B (non-bold dim name): | Technical Trend | **N / max** | reasoning |
    if (!rowMatches.length) {
      rowMatches = [...text.matchAll(
        /\|\s+([A-Za-z][^|`\n]{1,50}?)\s*\|\s+\*{0,2}(\d+)\s*\/\s*(\d+)\*{0,2}\s*\|([^|]*)\|/g
      )].filter(m => !/(Dimension|Score|Rationale|Reasoning|Max|-{3})/i.test(m[1]));
    }

    // ── Step 2: Heading-per-dim fallback ─────────────────────────────────
    // Supports ## or ### prefix, ) or . separator; also bold-inline "**N) Name: score/max**"
    const dimBlocks = rowMatches.length ? [] : (() => {
      const hd = [...text.matchAll(
        /^#{2,3}\s+\d+[.)]\s+([^:`*\n]+?):\s*\*\*(\d+)\s*\/\s*(\d+)\*\*([\s\S]*?)(?=\n#{2,3}\s|\n#\s|$)/gm
      )];
      if (hd.length) return hd;
      // "**N) Name: score / max**\n  body..." (bold-line format, no heading marker)
      return [...text.matchAll(
        /^\*\*\d+[.)]\s+([^:*\n]+?):\s*(\d+)\s*\/\s*(\d+)\*\*([\s\S]*?)(?=\n\*\*\d+[.)]|\n#{1,3}\s|$)/gm
      )];
    })();

    // ── Step 3: Total score — explicit line or computed from dims ─────────
    const totalM =
      text.match(/Total Score[^0-9\n]{0,30}(\d+)\s*\/\s*100/i) ||
      text.match(/Total Score\s*\n\s*\*{0,2}(\d+)\s*\/\s*100/i) ||
      text.match(/Score:\s*\*{0,2}(\d+)\s*\/\s*100/i);

    let total;
    if (totalM) {
      total = parseInt(totalM[1]);
    } else if (rowMatches.length) {
      total = rowMatches.reduce((s, m) => s + parseInt(m[2]), 0);
    } else if (dimBlocks.length) {
      total = dimBlocks.reduce((s, m) => s + parseInt(m[2]), 0);
    } else {
      return null;
    }

    // ── Step 4: Rating — explicit or derived from total ───────────────────
    const RATINGS = 'Strong Buy|Strong Sell|Overweight|Underweight|Hold|Buy|Sell';
    const ratingM =
      text.match(new RegExp(`(?:Rating|Decision)[:\\s*]{0,15}(${RATINGS})`, 'i')) ||
      text.match(new RegExp(`(?:Rating|Decision)\\s*\\n\\s*\\*{0,2}(${RATINGS})`, 'i'));
    const rating = ratingM ? ratingM[1].trim() : ratingFromTotal(total);

    // ── Step 5: Build dims array ──────────────────────────────────────────
    const thesisM = text.match(/(?:Concise\s+)?Investment [Tt]hesis\s*\n+([\s\S]+?)(?=\n##|\n#\s|$)/i);

    if (rowMatches.length) {
      const dims = rowMatches.map(m => ({
        name: m[1].trim().replace(/^\d+\.\s*/, ''),
        score: parseInt(m[2]), max: parseInt(m[3]), reasoning: m[4].trim()
      }));
      return { rating, total, dims, thesis: (thesisM?.[1] || '').trim() };
    }

    if (dimBlocks.length) {
      const dims = dimBlocks.map(m => ({
        name: m[1].trim(), score: parseInt(m[2]), max: parseInt(m[3]),
        reasoning: m[4].replace(/\*\*/g, '').replace(/^[-•]\s*/gm, '')
                       .replace(/\n+/g, ' ').trim().slice(0, 220)
      }));
      return { rating, total, dims, thesis: (thesisM?.[1] || '').trim() };
    }

    return null;
  }

  // ── Scorecard renderer ───────────────────────────────────────────────
  function ringColor(pct) {
    if (pct >= 0.75) return '#22c55e';
    if (pct >= 0.55) return '#3b82f6';
    if (pct >= 0.38) return '#f59e0b';
    return '#ef4444';
  }

  function makeRing(score, max, size, strokeW, fontSize) {
    const r    = (size - strokeW) / 2;
    const circ = 2 * Math.PI * r;
    const pct  = score / max;
    const fill = pct * circ;
    const gap  = circ - fill;
    const color = ringColor(pct);
    const label = Math.round(pct * 100) + '%';
    return `<svg class="sc-dim-ring" width="${size}" height="${size}" viewBox="0 0 ${size} ${size}">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1a1a22" stroke-width="${strokeW}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${strokeW}"
        stroke-dasharray="${fill.toFixed(2)} ${gap.toFixed(2)}" stroke-linecap="round"
        transform="rotate(-90 ${size/2} ${size/2})"/>
      <text x="${size/2}" y="${size/2}" text-anchor="middle" dominant-baseline="middle"
        font-size="${fontSize * 0.85}" font-weight="800" fill="${color}" font-family="Inter,system-ui,sans-serif">${label}</text>
    </svg>`;
  }

  const SIGNAL_COLORS = {
    BUY:         '#22c55e',
    OVERWEIGHT:  '#60a5fa',
    HOLD:        '#f59e0b',
    UNDERWEIGHT: '#f97316',
    SELL:        '#ef4444',
    UNKNOWN:     '#666',
  };

  function makeRingGeneric(value, max, color, size, strokeW) {
    const r    = (size - strokeW) / 2;
    const circ = 2 * Math.PI * r;
    const pct  = value / max;
    const fill = pct * circ;
    const gap  = circ - fill;
    const fontSize = size * 0.22;
    return `<svg width="${size}" height="${size}" viewBox="0 0 ${size} ${size}" style="flex-shrink:0">
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="#1a1a22" stroke-width="${strokeW}"/>
      <circle cx="${size/2}" cy="${size/2}" r="${r}" fill="none" stroke="${color}" stroke-width="${strokeW}"
        stroke-dasharray="${fill.toFixed(2)} ${gap.toFixed(2)}" stroke-linecap="round"
        transform="rotate(-90 ${size/2} ${size/2})"/>
      <text x="${size/2}" y="${size/2}" text-anchor="middle" dominant-baseline="middle"
        font-size="${fontSize.toFixed(1)}" font-weight="800" fill="${color}" font-family="Inter,system-ui,sans-serif">${Math.round(value)}%</text>
    </svg>`;
  }

  function outlookColor(pct) {
    // 0=red, 0.5=yellow, 1=green
    if (pct >= 0.65) return '#22c55e';
    if (pct >= 0.45) return '#f59e0b';
    return '#ef4444';
  }

  function renderAnalystSignalHeader(analystSig) {
    if (!analystSig) return '';
    const sigColor = SIGNAL_COLORS[analystSig.signal] || SIGNAL_COLORS.UNKNOWN;
    const border   = hexToRgba(sigColor, 0.25);
    const bg       = hexToRgba(sigColor, 0.06);

    const hasOutlook = analystSig.outlook !== null;
    const hasConf    = analystSig.confidence !== null;
    const outPct     = (analystSig.outlook ?? 50) / 100;
    const outColor   = outlookColor(outPct);

    const outlookRing = hasOutlook
      ? `<div style="display:flex;flex-direction:column;align-items:center;gap:4px">
           ${makeRingGeneric(analystSig.outlook, 100, outColor, 78, 7)}
           <span style="font-size:10px;color:#555;font-weight:600;text-transform:uppercase;letter-spacing:0.5px">Outlook</span>
         </div>`
      : '';

    const confRing = hasConf
      ? `<div style="display:flex;flex-direction:column;align-items:center;gap:4px">
           ${makeRingGeneric(analystSig.confidence, 100, sigColor, 78, 7)}
           <span style="font-size:10px;color:#555;font-weight:600;text-transform:uppercase;letter-spacing:0.5px">Confidence</span>
         </div>`
      : '';

    return `<div class="analyst-sig-header" style="background:${bg};border-color:${border}">
      ${outlookRing}${confRing}
      <div style="margin-left:4px">
        <div class="analyst-sig-label" style="color:${sigColor}">${escHtml(analystSig.label)}</div>
        <div class="analyst-sig-conf">Analyst recommendation</div>
      </div>
    </div>`;
  }

  function hexToRgba(hex, alpha) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return `rgba(${r},${g},${b},${alpha})`;
  }

  function renderScorecard(sc, signal) {
    const palette = {
      BUY:     { text: '#22c55e', bg: 'rgba(34,197,94,0.08)',    border: 'rgba(34,197,94,0.25)' },
      SELL:    { text: '#ef4444', bg: 'rgba(239,68,68,0.08)',     border: 'rgba(239,68,68,0.25)' },
      HOLD:    { text: '#f59e0b', bg: 'rgba(245,158,11,0.08)',    border: 'rgba(245,158,11,0.25)' },
      UNKNOWN: { text: '#888',   bg: 'rgba(128,128,128,0.05)',   border: 'rgba(128,128,128,0.2)' },
    };
    // Prefer signal derived from the parsed rating — parseDecision can return UNKNOWN
    // even when the scorecard has a valid rating (e.g. when the header text doesn't match).
    const effectiveSignal = sc.rating ? classify(sc.rating).signal : signal;
    const rc = palette[effectiveSignal] || palette.UNKNOWN;

    let html = '<div class="sc-wrap">';
    html += `
      <div class="sc-header" style="border-color:${rc.border};background:${rc.bg}">
        <div>
          <div class="sc-rating" style="color:${rc.text}">${escHtml(sc.rating)}</div>
          <div class="sc-thresholds">Buy ≥70 &middot; Overweight ≥55 &middot; Hold ≥38 &middot; Underweight ≥22 &middot; Sell &lt;22</div>
        </div>
        <div class="sc-total-ring">${makeRing(sc.total, 100, 90, 7, 22)}</div>
      </div>`;

    html += '<div class="sc-dims">';
    for (const dim of sc.dims) {
      const pct = dim.score / dim.max;
      html += `
        <div class="sc-dim">
          <div class="sc-dim-row">
            ${makeRing(dim.score, dim.max, 56, 5, 13)}
            <div class="sc-dim-text">
              <div class="sc-dim-name">${escHtml(dim.name)}<span style="font-size:11px;color:#555;font-weight:400"> /${dim.max}</span></div>
              ${dim.reasoning ? `<div class="sc-dim-reason">${escHtml(dim.reasoning)}</div>` : ''}
            </div>
          </div>
        </div>`;
    }
    html += '</div>';

    if (sc.thesis) {
      html += `
        <div class="sc-thesis">
          <div class="sc-thesis-label">Investment Thesis</div>
          <div class="sc-thesis-body">${marked.parse(sc.thesis)}</div>
        </div>`;
    }
    if (sc.priceTarget || sc.timeHorizon) {
      html += '<div class="sc-meta">';
      if (sc.priceTarget) html += `<span><strong>Price Target:</strong> ${escHtml(sc.priceTarget)}</span>`;
      if (sc.timeHorizon) html += `<span><strong>Time Horizon:</strong> ${escHtml(sc.timeHorizon)}</span>`;
      html += '</div>';
    }
    html += '</div>';
    return html;
  }

  // ── Sidebar ─────────────────────────────────────────────────────────
  async function loadSidebar() {
    const res = await fetch('/api/reports');
    const reports = await res.json();
    const sidebar = document.getElementById('sidebar');
    sidebar.innerHTML = '';

    if (!reports.length) {
      sidebar.innerHTML = '<div class="sidebar-empty">No saved reports yet.</div>';
      return;
    }

    // Group by ticker
    const grouped = {};
    for (const r of reports) {
      (grouped[r.ticker] ||= []).push(r.date);
    }

    for (const [ticker, dates] of Object.entries(grouped)) {
      const grp = document.createElement('div');
      grp.className = 'ticker-group';

      const label = document.createElement('div');
      label.className = 'ticker-label';
      label.innerHTML = `<span>${ticker}</span><span class="chevron">▶</span>`;
      label.onclick = () => {
        label.classList.toggle('open');
        dateList.classList.toggle('open');
      };

      const dateList = document.createElement('div');
      dateList.className = 'date-list';

      for (const date of dates) {
        const item = document.createElement('div');
        item.className = 'date-item';
        item.textContent = date;
        item.dataset.ticker = ticker;
        item.dataset.date   = date;
        item.onclick = () => loadReport(ticker, date, item);
        dateList.appendChild(item);
      }

      grp.appendChild(label);
      grp.appendChild(dateList);
      sidebar.appendChild(grp);

      // Auto-expand if only one ticker
      if (Object.keys(grouped).length === 1) {
        label.classList.add('open');
        dateList.classList.add('open');
      }
    }
  }

  // ── Company info renderer ────────────────────────────────────────────
  function fmtMktCap(v) {
    if (!v) return '—';
    if (v >= 1e9) return '$' + (v / 1e9).toFixed(2) + 'B';
    if (v >= 1e6) return '$' + (v / 1e6).toFixed(1) + 'M';
    return '$' + v.toLocaleString();
  }
  function fmtNum(v, decimals = 2, suffix = '') {
    if (v == null) return '—';
    return v.toFixed(decimals) + suffix;
  }

  function renderCompanyPanel(co) {
    const f = co.fundamentals || {};
    const metrics = [
      { label: 'Market Cap',    value: fmtMktCap(co.market_cap) },
      { label: 'PE Ratio',      value: fmtNum(f.pe_ratio) },
      { label: '52W High',      value: f['52_week_high'] != null ? '$' + f['52_week_high'].toFixed(2) : '—' },
      { label: '52W Low',       value: f['52_week_low']  != null ? '$' + f['52_week_low'].toFixed(2)  : '—' },
      { label: 'EPS',           value: f.eps != null ? '$' + f.eps.toFixed(2) : '—' },
      { label: 'Beta',          value: fmtNum(f.beta) },
      { label: 'ROE',           value: fmtNum(f.roe, 2, '%') },
      { label: 'Dividend Yield',value: f.dividend_yield != null ? fmtNum(f.dividend_yield, 2, '%') : '—' },
    ];

    let html = '<div style="animation:fadeIn 0.15s ease">';

    html += '<div class="co-header">';
    if (co.logo_data) html += `<img class="co-logo" src="${escHtml(co.logo_data)}" alt="">`;
    html += `<div>
      <div class="co-name">${escHtml(co.name || '')}</div>
      <div class="co-chips">
        ${co.sector   ? `<span class="co-chip">${escHtml(co.sector)}</span>` : ''}
        ${co.industry ? `<span class="co-chip">${escHtml(co.industry)}</span>` : ''}
      </div>
    </div></div>`;

    if (f.description) {
      html += `<p class="co-description">${escHtml(f.description)}</p>`;
    }
    if (f.website) {
      html += `<div class="co-website">🌐 <a href="${escHtml(f.website)}" target="_blank" rel="noopener">${escHtml(f.website)}</a></div>`;
    }

    html += '<div class="co-metrics">';
    for (const m of metrics) {
      html += `<div class="co-metric"><div class="co-metric-label">${escHtml(m.label)}</div><div class="co-metric-value">${escHtml(m.value)}</div></div>`;
    }
    html += '</div></div>';
    return html;
  }

  // ── Report loader ────────────────────────────────────────────────────
  async function loadReport(ticker, date, itemEl) {
    document.querySelectorAll('.date-item').forEach(el => el.classList.remove('active'));
    itemEl.classList.add('active');

    document.getElementById('placeholder').style.display = 'none';
    const teamBar   = document.getElementById('team-bar');
    const subBar    = document.getElementById('sub-bar');
    const tabPanels = document.getElementById('tab-panels');
    const rhHeader  = document.getElementById('report-header');
    const rhLogo    = document.getElementById('rh-logo');

    teamBar.classList.remove('visible');
    subBar.classList.remove('visible');
    teamBar.innerHTML = '<div class="loading" style="padding:4px 0"><div class="spinner"></div></div>';
    tabPanels.innerHTML = '';
    rhHeader.classList.remove('visible');
    rhLogo.style.display = 'none';

    // Strip .AX for ASX Short API
    const code = ticker.replace(/\.AX$/i, '');

    let data, coData = null;
    try {
      const [rRes, coRes] = await Promise.all([
        fetch(`/api/reports/${encodeURIComponent(ticker)}/${encodeURIComponent(date)}`),
        fetch(`/api/company/${code}`).catch(() => null),
      ]);
      if (!rRes.ok) throw new Error(await rRes.text());
      data = await rRes.json();
      if (coRes?.ok) coData = await coRes.json().catch(() => null);
    } catch (e) {
      teamBar.innerHTML = `<div style="padding:12px 24px;color:#ef4444;font-size:13px">Failed to load: ${e.message}</div>`;
      teamBar.classList.add('visible');
      return;
    }

    // Header badge + logo
    const { signal, label } = parseDecision(data.final_trade_decision || '');
    document.getElementById('rh-badge-wrap').className = signal;
    document.getElementById('rh-badge').textContent = label;
    document.getElementById('rh-title').textContent = ticker;
    document.getElementById('rh-date').textContent  = date;
    if (coData?.logo_data) {
      rhLogo.src = coData.logo_data;
      rhLogo.style.display = 'block';
    }
    rhHeader.classList.add('visible');

    // Build all report panels upfront (hidden)
    tabPanels.innerHTML = '';
    for (const team of TEAMS) {
      for (const report of team.reports) {
        const content = (data[report.key] || '').trim();
        const panel = document.createElement('div');
        panel.className = 'tab-content';
        panel.id = `panel-${report.key}`;
        if (report.key === 'final_trade_decision') {
          const sc = parseScorecard(content);
          panel.innerHTML = sc
            ? renderScorecard(sc, signal)
            : `<div class="decision-panel ${signal}"><div class="md-body">${marked.parse(content || '')}</div></div>`;
        } else {
          const md = report.key === 'short_interest_report'
            ? content.replace(/^FINAL\s+TRANSACTION\s+PROPOSAL:[^\n]+\n*/i, '')
            : (report.key === 'investment_plan' || report.key === 'trader_investment_plan')
            ? content.replace(/^\*\*Recommendation(?:\s+for\s+[^*:\n]+)?\*{0,2}:[^\n]+\n*/im, '')
            : content;
          const analystSig = parseAnalystSignal(content);
          const sigHeader = renderAnalystSignalHeader(analystSig);
          panel.innerHTML = `${sigHeader}<div class="md-body" style="animation:fadeIn 0.15s ease">${marked.parse(md || '')}</div>`;
        }
        tabPanels.appendChild(panel);
      }
    }

    // Add company info panel if data available
    if (coData) {
      const coPanel = document.createElement('div');
      coPanel.className = 'tab-content';
      coPanel.id = 'panel-company_info';
      coPanel.innerHTML = renderCompanyPanel(coData);
      tabPanels.appendChild(coPanel);
    }

    // Build team bar — company tab first, then report teams that have content
    teamBar.innerHTML = '';
    const availableTeams = TEAMS.filter(t => t.reports.some(r => (data[r.key] || '').trim()));

    const coTeam = coData ? [{ key: 'company', label: 'Company', reports: [{ key: 'company_info', label: 'Company Info' }] }] : [];
    const allTeams = [...coTeam, ...availableTeams];

    allTeams.forEach(team => {
      const btn = document.createElement('button');
      btn.className = 'team-btn';
      btn.textContent = team.label;
      btn.dataset.team = team.key;
      btn.onclick = () => selectTeam(team.key, data, signal);
      teamBar.appendChild(btn);
    });

    // Add colour style for company tab
    const style = document.getElementById('co-tab-style') || document.createElement('style');
    style.id = 'co-tab-style';
    style.textContent = `.team-btn[data-team="company"]:hover{color:#38bdf8;border-color:rgba(56,189,248,0.4)}.team-btn[data-team="company"].active{color:#38bdf8;background:rgba(56,189,248,0.1);border-color:rgba(56,189,248,0.45)}`;
    document.head.appendChild(style);

    teamBar.classList.add('visible');

    // Select first available team
    if (allTeams.length) selectTeam(allTeams[0].key, data, signal);
  }

  function selectTeam(teamKey, data, signal) {
    // Highlight team button
    document.querySelectorAll('.team-btn').forEach(b => b.classList.toggle('active', b.dataset.team === teamKey));

    // Company tab — panel already built, no sub-bar needed
    if (teamKey === 'company') {
      document.getElementById('sub-bar').classList.remove('visible');
      showPanel('company_info');
      return;
    }

    const team = TEAMS.find(t => t.key === teamKey);
    const subBar = document.getElementById('sub-bar');
    subBar.innerHTML = '';

    const availableReports = team.reports.filter(r => (data[r.key] || '').trim());

    if (availableReports.length <= 1) {
      // Single report — no sub-bar needed, just show it directly
      // But still show a minimal sub-bar with signal+score if available
      subBar.innerHTML = '';
      if (availableReports.length === 1) {
        const report = availableReports[0];
        const analystSig = parseAnalystSignal(data[report.key] || '');
        if (analystSig) {
          const btn = document.createElement('button');
          btn.className = 'sub-btn active';
          btn.dataset.key = report.key;
          const scoreStr = analystSig.confidence !== null ? ` ${analystSig.confidence}%` : '';
          btn.innerHTML = `${report.label} <span style="font-size:10px;opacity:0.7;margin-left:3px">${analystSig.label}${scoreStr}</span>`;
          btn.onclick = () => showPanel(report.key);
          subBar.appendChild(btn);
          subBar.classList.add('visible');
        } else {
          subBar.classList.remove('visible');
        }
        showPanel(report.key);
      } else {
        subBar.classList.remove('visible');
      }
    } else {
      // Multiple reports — show sub-bar
      availableReports.forEach((report, i) => {
        const btn = document.createElement('button');
        btn.className = 'sub-btn';
        btn.dataset.key = report.key;
        // Annotate with signal + confidence if the report has an Analyst Signal block
        const analystSig = parseAnalystSignal(data[report.key] || '');
        if (analystSig && analystSig.confidence !== null) {
          btn.innerHTML = `${report.label} <span style="font-size:10px;opacity:0.7;margin-left:3px">${analystSig.label} ${analystSig.confidence}%</span>`;
        } else if (analystSig) {
          btn.innerHTML = `${report.label} <span style="font-size:10px;opacity:0.7;margin-left:3px">${analystSig.label}</span>`;
        } else {
          btn.textContent = report.label;
        }
        btn.onclick = () => {
          document.querySelectorAll('.sub-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          showPanel(report.key);
        };
        subBar.appendChild(btn);
      });
      subBar.classList.add('visible');
      subBar.querySelector('.sub-btn').classList.add('active');
      showPanel(availableReports[0].key);
    }
  }

  function showPanel(key) {
    document.querySelectorAll('.tab-content').forEach(p => p.classList.remove('active'));
    const panel = document.getElementById(`panel-${key}`);
    if (panel) { panel.classList.add('active'); panel.scrollTop = 0; }
  }

  // ── Init ─────────────────────────────────────────────────────────────
  marked.setOptions({ breaks: true, gfm: true });

  async function loadSidebarAndAutoSelect() {
    await loadSidebar();
    // Auto-load a report if URL params are present (e.g. from Run Analysis redirect)
    const params = new URLSearchParams(window.location.search);
    const ticker = params.get('ticker');
    const date   = params.get('date');
    if (!ticker || !date) return;
    // Find the matching date-item in the sidebar and click it
    const item = [...document.querySelectorAll('.date-item')].find(
      el => el.dataset.ticker === ticker && el.dataset.date === date
    );
    if (item) {
      // Expand its parent group first
      const grp = item.closest('.ticker-group');
      grp?.querySelector('.ticker-label')?.classList.add('open');
      item.closest('.date-list')?.classList.add('open');
      item.click();
      item.scrollIntoView({ block: 'nearest' });
    }
  }

  async function loadLatestForTicker(ticker) {
    const res = await fetch('/api/reports');
    const reports = await res.json();
    // Reports are already sorted newest first
    const match = reports.find(r => r.ticker === ticker);
    if (!match) {
      document.getElementById('placeholder').querySelector('p').textContent = `No reports found for ${ticker}.`;
      return;
    }
    // Use a dummy element so loadReport's active-item logic doesn't break
    const dummy = document.createElement('div');
    await loadReport(match.ticker, match.date, dummy);
  }

  async function init() {
    const params = new URLSearchParams(window.location.search);
    const tickerParam = params.get('ticker');

    const authRes = await fetch('/api/auth/status').then(r => r.json()).catch(() => ({ authenticated: false }));

    if (authRes.authenticated) {
      document.getElementById('analysis-nav-link').style.display = '';
      document.getElementById('sync-nav-link').style.display = '';
      document.getElementById('logout-nav-link').style.display = '';
      // Full experience: sidebar + optional auto-select
      await loadSidebarAndAutoSelect();
    } else if (tickerParam) {
      // Public view: no sidebar, auto-load latest report for this ticker
      document.getElementById('sidebar').style.display = 'none';
      await loadLatestForTicker(tickerParam);
    } else {
      // No ticker and not logged in → redirect to login
      window.location.href = '/login';
    }
  }

  init();
</script>
</body>
</html>
